app = "wireos-backend"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[http_service.checks]]
  interval = "15s"
  timeout  = "5s"
  grace_period = "5s"
  method = "GET"
  path   = "/health"