# WireOS Intent Routing Table
# TBD actions replaced with anakin.agentic_search + static queries so they
# work with empty params from the frontend. web_research uses {user_input}
# intentionally — it requires the user to type a query.

intents:
  - id: recent_purchases
    label: "Recent Purchases"
    description: "What did I buy recently and how much did I spend?"
    actions:
      - action_id: amazon.order_history
        site: amazon
        params_template:
          days: 30
          limit: 50
        identity_required: true
        output_type: transaction

  - id: professional_activity
    label: "Professional Activity"
    description: "What have I been doing professionally this week?"
    actions:
      - action_id: linkedin.activity_feed
        site: linkedin
        params_template:
          days: 7
        identity_required: true
        output_type: activity
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my linkedin profile summary and headline"
        identity_required: false
        output_type: generic

  - id: github_activity
    label: "GitHub Activity"
    description: "Show my recent commits, PRs, and code reviews."
    actions:
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my github commits and pushes in the last 7 days"
        identity_required: false
        output_type: activity
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my open and recently merged github pull requests"
        identity_required: false
        output_type: activity

  - id: portfolio_snapshot
    label: "Portfolio Snapshot"
    description: "What is my current investment portfolio and net worth estimate?"
    actions:
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my robinhood portfolio total value and day change"
        identity_required: false
        output_type: generic
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my robinhood stock positions and holdings"
        identity_required: false
        output_type: generic

  - id: job_applications
    label: "Job Applications"
    description: "What jobs have I applied to and what is their status?"
    actions:
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my linkedin job applications status and updates"
        identity_required: false
        output_type: activity
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "my saved jobs on linkedin"
        identity_required: false
        output_type: generic

  - id: web_research
    label: "Web Research"
    description: "Search the web for current information on a topic."
    actions:
      - action_id: anakin.agentic_search
        site: anakin
        params_template:
          query: "{user_input}"
          depth: standard
        identity_required: false
        output_type: generic